name: Publish Release

# Trigger on version tags like v1.0.0 or v1.2.3
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create releases and push manifest.json

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # в”Ђв”Ђ 1. Checkout (full history so we can push back to main) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # в”Ђв”Ђ 2. Derive version from the pushed tag в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Extract version
        id: version
        run: |
          # tag = v1.2.3  в†’  VERSION = 1.2.3  в†’  ASSEMBLY_VERSION = 1.2.3.0
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "TAG_VERSION=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ASSEMBLY_VERSION=${TAG}.0" >> "$GITHUB_OUTPUT"
          echo "ZIP_NAME=jellyfin-youtubesync_${TAG}.zip" >> "$GITHUB_OUTPUT"

      # в”Ђв”Ђ 3. Patch the version in meta.json before building в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Update meta.json version
        run: |
          VERSION="${{ steps.version.outputs.ASSEMBLY_VERSION }}"
          python3 - << 'PYEOF'
          import json, os, sys
          path = "Jellyfin.Plugin.YouTubeSync/meta.json"
          with open(path) as f:
              data = json.load(f)
          data["version"] = os.environ["VERSION"]
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PYEOF
        env:
          VERSION: ${{ steps.version.outputs.ASSEMBLY_VERSION }}

      # в”Ђв”Ђ 4. Setup .NET 8 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # в”Ђв”Ђ 5. Build & publish (Release) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Publish plugin
        run: |
          dotnet publish Jellyfin.Plugin.YouTubeSync/Jellyfin.Plugin.YouTubeSync.csproj \
            -c Release \
            --no-self-contained \
            -p:Version=${{ steps.version.outputs.ASSEMBLY_VERSION }} \
            -p:AssemblyVersion=${{ steps.version.outputs.ASSEMBLY_VERSION }} \
            -p:FileVersion=${{ steps.version.outputs.ASSEMBLY_VERSION }} \
            -p:InformationalVersion=${{ steps.version.outputs.TAG_VERSION }} \
            -o publish/

      # в”Ђв”Ђ 6. Bundle DLL + meta.json into a ZIP в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Create release ZIP
        run: |
          cp Jellyfin.Plugin.YouTubeSync/meta.json publish/
          cd publish
          zip -j "../${{ steps.version.outputs.ZIP_NAME }}" \
            Jellyfin.Plugin.YouTubeSync.dll \
            meta.json

      # в”Ђв”Ђ 7. Compute MD5 checksum (required by Jellyfin manifest) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Compute MD5 checksum
        id: checksum
        run: |
          MD5=$(md5sum "${{ steps.version.outputs.ZIP_NAME }}" | awk '{print $1}')
          echo "MD5=${MD5}" >> "$GITHUB_OUTPUT"

      # в”Ђв”Ђ 8. Create the GitHub Release and upload the ZIP в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: "YouTubeSync v${{ steps.version.outputs.TAG_VERSION }}"
          generate_release_notes: true
          files: ${{ steps.version.outputs.ZIP_NAME }}

      # в”Ђв”Ђ 9. Update manifest.json on the default branch в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Update manifest.json
        run: |
          export TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DEFAULT_BRANCH=$(git remote show origin | awk '/HEAD branch/ {print $NF}')
          git fetch origin "${DEFAULT_BRANCH}"
          export DEFAULT_BRANCH
          export VERSION="${{ steps.version.outputs.ASSEMBLY_VERSION }}"
          export CHECKSUM="${{ steps.checksum.outputs.MD5 }}"
          export DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.version.outputs.ZIP_NAME }}"

          python3 - << 'PYEOF'
          import json, os, subprocess

          default_branch = os.environ["DEFAULT_BRANCH"]

          # Read manifest.json from the default branch so prior versions are preserved
          raw = subprocess.check_output(
              ["git", "show", f"origin/{default_branch}:manifest.json"],
              text=True
          )
          data = json.loads(raw)

          new_entry = {
              "version":    os.environ["VERSION"],
              "changelog":  f"Release {os.environ['VERSION']}",
              "targetAbi":  "10.11.6.0",
              "sourceUrl":  os.environ["DOWNLOAD_URL"],
              "checksum":   os.environ["CHECKSUM"],
              "timestamp":  os.environ["TIMESTAMP"]
          }

          # Prepend so the newest version is first
          data[0]["versions"].insert(0, new_entry)

          # Write to a temp file so the branch switch in the next step doesn't clobber it
          with open("/tmp/updated-manifest.json", "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PYEOF

      # в”Ђв”Ђ 10. Commit the updated manifest.json back to main в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Commit manifest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DEFAULT_BRANCH=$(git remote show origin | awk '/HEAD branch/ {print $NF}')
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout "${DEFAULT_BRANCH}"

          # Use the manifest built in the previous step (not the tag's copy)
          cp /tmp/updated-manifest.json manifest.json

          git add manifest.json
          git diff --cached --quiet && echo "manifest.json unchanged вЂ“ nothing to commit" && exit 0
          git commit -m "chore: update manifest.json for v${{ steps.version.outputs.TAG_VERSION }} [skip ci]"
          git push origin "${DEFAULT_BRANCH}"
